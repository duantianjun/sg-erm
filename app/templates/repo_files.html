{% extends "base.html" %}

{% block title %}仓库文件{% endblock %}

{% block content %}
<div class="page-title">仓库文件</div>

<!-- 顶部工具栏 -->
<div class="sg-card" style="margin-bottom:15px;padding:12px 20px;">
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <div class="layui-btn-group">
      <button class="layui-btn layui-btn-sm" id="btn-view-flat">扁平视图</button>
      <button class="layui-btn layui-btn-sm layui-btn-primary" id="btn-view-tree">树形视图</button>
    </div>
    <button class="layui-btn layui-btn-sm layui-btn-warm" id="btn-consistency">
      <i class="layui-icon layui-icon-fonts-code"></i> 一致性检查
    </button>
    <button class="layui-btn layui-btn-sm" id="btn-refresh">
      <i class="layui-icon layui-icon-refresh"></i> 刷新
    </button>
    <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
      <div class="layui-input-inline" style="width:200px;">
        <input type="text" id="search-keyword" placeholder="搜索包名/扩展名" class="layui-input">
      </div>
      <button class="layui-btn layui-btn-sm" id="btn-search">搜索</button>
    </div>
  </div>
</div>

<!-- 左右分栏 -->
<div style="display:flex;gap:15px;align-items:flex-start;">
  <!-- 左侧树形视图（扁平模式下隐藏） -->
  <div id="tree-panel" class="sg-card" style="width:30%;min-width:200px;display:none;padding:12px;">
    <div style="font-weight:600;margin-bottom:10px;color:#333;">
      <i class="layui-icon layui-icon-list"></i> 目录结构
    </div>
    <div id="repo-tree" style="font-size:13px;"></div>
  </div>

  <!-- 右侧包列表 -->
  <div style="flex:1;min-width:0;">
    <!-- 路径面包屑（树形模式下显示） -->
    <div id="breadcrumb" class="sg-card" style="display:none;margin-bottom:10px;padding:8px 15px;font-size:13px;color:#666;">
      <i class="layui-icon layui-icon-location"></i>
      <span>当前路径：</span>
      <span id="breadcrumb-text" style="color:#1e9fff;font-weight:600;">全部</span>
    </div>
    <table id="packages-table" lay-filter="packages-table"></table>
  </div>
</div>

<!-- 缓存状态列模板 -->
<script type="text/html" id="cached-tpl">
  {% raw %}{{# if(d.file_exists){ }}{% endraw %}
    <span style="color:#5fb878;font-weight:600;">已缓存</span>
  {% raw %}{{# } else { }}{% endraw %}
    <span style="color:#ff5722;font-weight:600;">文件缺失</span>
  {% raw %}{{# } }}{% endraw %}
</script>

<!-- 验证结果列模板 -->
<script type="text/html" id="verify-tpl">
  {% raw %}{{# if(d.verify_result === 'match'){ }}{% endraw %}
    <span style="color:#5fb878;font-weight:600;">匹配</span>
  {% raw %}{{# } else if(d.verify_result === 'mismatch'){ }}{% endraw %}
    <span style="color:#ff5722;font-weight:600;">不匹配</span>
  {% raw %}{{# } else { }}{% endraw %}
    <span style="color:#999;">-</span>
  {% raw %}{{# } }}{% endraw %}
</script>

<!-- 操作列模板 -->
<script type="text/html" id="row-ops">
  <button class="layui-btn layui-btn-xs" lay-event="verify">验证</button>
  <button class="layui-btn layui-btn-xs layui-btn-normal" lay-event="redownload">{% raw %}{{# if(d._downloading){ }}{% endraw %}<i class="layui-icon layui-icon-loading-1"></i> 下载中{% raw %}{{# } else { }}{% endraw %}重下载{% raw %}{{# } }}{% endraw %}</button>
  <button class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete">删除</button>
</script>

{% endblock %}

{% block extra_script %}
<script>
layui.use(['table', 'layer', 'form', 'tree'], function(){
  var table = layui.table;
  var layer = layui.layer;
  var form = layui.form;
  var tree = layui.tree;

  // ─── 状态管理 ──────────────────────────────────────
  var viewMode = 'flat'; // 'flat' | 'tree'
  var currentFilter = { publisher: '', arch: '', os: '', keyword: '' };

  // ─── 文件大小格式化 ──────────────────────────────
  function formatSize(bytes) {
    if (!bytes || bytes <= 0) return '-';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
    if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
  }

  // ─── 包列表表格 ──────────────────────────────────
  table.render({
    elem: '#packages-table',
    url: '/api/v1/repo-files/packages',
    method: 'get',
    where: { page: 1, limit: 20 },
    parseData: function(res) {
      return {
        code: res.code,
        msg: res.msg,
        count: res.count,
        data: res.data
      };
    },
    page: true,
    limit: 20,
    limits: [10, 20, 50, 100],
    cols: [[
      { field: 'publisher', title: '发布者', width: 120 },
      { field: 'arch', title: '架构', width: 90 },
      { field: 'os', title: 'OS', width: 80 },
      { field: 'package_name', title: '包名', width: 200 },
      { field: 'extension_name', title: '扩展名', width: 120 },
      { field: 'version', title: '版本', width: 80 },
      { field: 'postgres_version', title: 'PG版本', width: 90 },
      { field: 'package_size', title: '大小', width: 100, templet: function(d) {
        return formatSize(d.package_size);
      }},
      { field: 'sha256', title: 'SHA256', width: 120, templet: function(d) {
        if (!d.sha256) return '<span style="color:#999;">-</span>';
        return '<span title="' + d.sha256 + '">' + d.sha256.substring(0, 12) + '</span>';
      }},
      { field: 'file_exists', title: '缓存状态', width: 90, templet: '#cached-tpl' },
      { field: 'verify_result', title: '验证', width: 80, templet: '#verify-tpl' },
      { title: '操作', width: 220, toolbar: '#row-ops', fixed: 'right' }
    ]],
    skin: 'row',
    even: true
  });

  // ─── 重载表格（合并当前筛选条件） ──────────────────
  function reloadPackages() {
    var where = { page: 1, limit: 20 };
    if (currentFilter.publisher) where.publisher = currentFilter.publisher;
    if (currentFilter.arch) where.arch = currentFilter.arch;
    if (currentFilter.os) where.os = currentFilter.os;
    if (currentFilter.keyword) where.keyword = currentFilter.keyword;
    table.reload('packages-table', {
      where: where,
      page: { curr: 1 }
    });
  }

  // ─── 搜索 ────────────────────────────────────────
  document.getElementById('btn-search').onclick = function() {
    currentFilter.keyword = document.getElementById('search-keyword').value;
    reloadPackages();
  };
  document.getElementById('search-keyword').onkeyup = function(e) {
    if (e.key === 'Enter') document.getElementById('btn-search').click();
  };

  // ─── 刷新 ────────────────────────────────────────
  document.getElementById('btn-refresh').onclick = function() {
    reloadPackages();
    if (viewMode === 'tree') loadTree();
  };

  // ─── 视图切换 ────────────────────────────────────
  document.getElementById('btn-view-flat').onclick = function() {
    if (viewMode === 'flat') return;
    viewMode = 'flat';
    document.getElementById('tree-panel').style.display = 'none';
    document.getElementById('breadcrumb').style.display = 'none';
    this.classList.remove('layui-btn-primary');
    document.getElementById('btn-view-tree').classList.add('layui-btn-primary');
    // 清除树形筛选，保留关键词
    currentFilter.publisher = '';
    currentFilter.arch = '';
    currentFilter.os = '';
    reloadPackages();
  };

  document.getElementById('btn-view-tree').onclick = function() {
    if (viewMode === 'tree') return;
    viewMode = 'tree';
    document.getElementById('tree-panel').style.display = '';
    document.getElementById('breadcrumb').style.display = '';
    this.classList.remove('layui-btn-primary');
    document.getElementById('btn-view-flat').classList.add('layui-btn-primary');
    loadTree();
  };

  // ─── 树形视图 ────────────────────────────────────
  function loadTree() {
    apiFetch('/api/v1/repo-files/tree').then(function(r) {
      return r.json();
    }).then(function(res) {
      if (res.code !== 0) {
        layer.msg(res.msg || '加载目录树失败', { icon: 2 });
        return;
      }
      renderTree(res.data || []);
    }).catch(function(err) {
      layer.msg('加载目录树失败: ' + err.message, { icon: 2 });
    });
  }

  // 将后端数据转为 layui tree 格式，并汇总各层级数量
  function buildTreeData(data) {
    return data.map(function(p) {
      var pCount = 0;
      var pChildren = (p.children || []).map(function(a) {
        var aCount = 0;
        var aChildren = (a.children || []).map(function(o) {
          var cnt = o.count || 0;
          pCount += cnt;
          aCount += cnt;
          return {
            title: o.os + ' (' + cnt + ')',
            filterData: { publisher: p.publisher, arch: a.arch, os: o.os }
          };
        });
        return {
          title: a.arch + ' (' + aCount + ')',
          children: aChildren,
          filterData: { publisher: p.publisher, arch: a.arch, os: '' }
        };
      });
      return {
        title: p.publisher + ' (' + pCount + ')',
        children: pChildren,
        filterData: { publisher: p.publisher, arch: '', os: '' }
      };
    });
  }

  function renderTree(data) {
    var treeData = buildTreeData(data);
    tree.render({
      elem: '#repo-tree',
      data: treeData,
      showLine: true,
      onlyIconControl: true,
      click: function(node) {
        var fd = node.data.filterData || {};
        currentFilter.publisher = fd.publisher || '';
        currentFilter.arch = fd.arch || '';
        currentFilter.os = fd.os || '';
        // 更新面包屑
        var crumbs = [];
        if (fd.publisher) crumbs.push(fd.publisher);
        if (fd.arch) crumbs.push(fd.arch);
        if (fd.os) crumbs.push(fd.os);
        document.getElementById('breadcrumb-text').textContent = crumbs.length ? crumbs.join(' / ') : '全部';
        reloadPackages();
      }
    });
  }

  // 页面加载时预取树数据
  loadTree();

  // ─── 行操作 ──────────────────────────────────────
  table.on('tool(packages-table)', function(obj) {
    var data = obj.data;
    if (obj.event === 'verify') {
      doVerify(obj);
    } else if (obj.event === 'redownload') {
      doRedownload(obj);
    } else if (obj.event === 'delete') {
      doDelete(obj);
    }
  });

  // SHA256 验证
  function doVerify(obj) {
    var data = obj.data;
    apiFetch('/api/v1/repo-files/packages/' + data.build_id + '/verify', {
      method: 'POST'
    }).then(function(r) {
      return r.json();
    }).then(function(res) {
      if (res.code === 0) {
        var matched = res.data && res.data.matched;
        obj.update({
          verify_result: matched ? 'match' : 'mismatch'
        });
        layer.msg(matched ? 'SHA256 匹配' : 'SHA256 不匹配', { icon: matched ? 1 : 2 });
      } else {
        layer.msg(res.msg || '验证失败', { icon: 2 });
      }
    }).catch(function(err) {
      layer.msg('验证失败: ' + err.message, { icon: 2 });
    });
  }

  // 重新下载
  function doRedownload(obj) {
    var data = obj.data;
    var tr = obj.tr;
    var btn = tr && tr.find('[lay-event="redownload"]');
    // 按钮变为 loading 状态
    if (btn) {
      btn.attr('disabled', 'disabled').html('<i class="layui-icon layui-icon-loading-1"></i> 下载中');
    }
    apiFetch('/api/v1/repo-files/packages/' + data.build_id + '/redownload', {
      method: 'POST'
    }).then(function(r) {
      return r.json();
    }).then(function(res) {
      if (btn) btn.removeAttr('disabled').html('重下载');
      if (res.code === 0) {
        layer.msg('重新下载成功', { icon: 1 });
        reloadPackages();
      } else {
        layer.msg(res.msg || '重新下载失败', { icon: 2 });
      }
    }).catch(function(err) {
      if (btn) btn.removeAttr('disabled').html('重下载');
      layer.msg('重新下载失败: ' + err.message, { icon: 2 });
    });
  }

  // 删除
  function doDelete(obj) {
    var data = obj.data;
    var displayName = data.package_name || data.package_path || data.build_id;
    layer.confirm('确定删除包 "' + displayName + '" 吗？将同时删除磁盘文件并清除缓存记录。', {
      title: '确认删除'
    }, function(index) {
      apiFetch('/api/v1/repo-files/packages/' + data.build_id, {
        method: 'DELETE'
      }).then(function(r) {
        return r.json();
      }).then(function(res) {
        layer.close(index);
        if (res.code === 0) {
          layer.msg('已删除 ' + displayName + '，缓存已清除', { icon: 1 });
          reloadPackages();
          if (viewMode === 'tree') loadTree();
        } else {
          layer.msg(res.msg || '删除失败', { icon: 2 });
        }
      }).catch(function(err) {
        layer.close(index);
        layer.msg('删除失败: ' + err.message, { icon: 2 });
      });
    });
  }

  // ─── 一致性检查 ──────────────────────────────────
  document.getElementById('btn-consistency').onclick = function() {
    // 弹窗显示 loading
    var loadingIndex = layer.load(2, { shade: [0.3, '#000'] });

    apiFetch('/api/v1/repo-files/consistency-check', {
      method: 'POST'
    }).then(function(r) {
      return r.json();
    }).then(function(res) {
      layer.close(loadingIndex);
      if (res.code !== 0) {
        layer.msg(res.msg || '一致性检查失败', { icon: 2 });
        return;
      }
      var result = (res.data && res.data[0]) || { missing_files: [], orphan_files: [] };
      showConsistencyResult(result);
    }).catch(function(err) {
      layer.close(loadingIndex);
      layer.msg('一致性检查失败: ' + err.message, { icon: 2 });
    });
  };

  // ─── 一致性检查弹窗：全选全局函数 ──────────────────
  window._selectAllMissing = function(el) {
    document.querySelectorAll('input[name="missing-ck"]').forEach(function(cb) {
      cb.checked = el.checked;
    });
    if (typeof form !== 'undefined') form.render('checkbox');
  };
  window._selectAllOrphan = function(el) {
    document.querySelectorAll('input[name="orphan-ck"]').forEach(function(cb) {
      cb.checked = el.checked;
    });
    if (typeof form !== 'undefined') form.render('checkbox');
  };

  // 展示一致性检查结果（两列：missing_files / orphan_files）
  function showConsistencyResult(result) {
    var missing = result.missing_files || [];
    var orphan = result.orphan_files || [];

    var html = '<div style="padding:15px;">';

    // 概要
    html += '<div style="margin-bottom:15px;color:#666;font-size:13px;">' +
            '数据库有记录但文件缺失: <b style="color:#ff5722;">' + missing.length + '</b> 个 &nbsp;|&nbsp; ' +
            '磁盘有文件但数据库无记录: <b style="color:#ffb800;">' + orphan.length + '</b> 个' +
            '</div>';

    html += '<div style="display:flex;gap:15px;">';

    // 左侧：missing_files（可勾选删除数据库记录）
    html += '<div style="flex:1;min-width:0;">';
    html += '<div style="font-weight:600;margin-bottom:8px;color:#ff5722;"><i class="layui-icon layui-icon-close"></i> 文件缺失（数据库有记录）</div>';
    if (missing.length === 0) {
      html += '<div style="color:#999;padding:10px;border:1px solid #eee;border-radius:4px;">无缺失文件</div>';
    } else {
      html += '<div style="border:1px solid #eee;border-radius:4px;max-height:300px;overflow:auto;">';
      html += '<div style="padding:8px 10px;background:#f8f8f8;border-bottom:1px solid #eee;">' +
              '<input type="checkbox" id="missing-all" lay-skin="primary" onclick="window._selectAllMissing(this)"> ' +
              '<label for="missing-all" style="font-size:12px;cursor:pointer;">全选</label>' +
              '</div>';
      missing.forEach(function(item) {
        html += '<div style="padding:8px 10px;border-bottom:1px solid #f0f0f0;font-size:12px;">' +
                '<input type="checkbox" name="missing-ck" value="' + item.build_id + '" lay-skin="primary" title="' + (item.extension_name || '未知') + '"> ' +
                '<div style="margin-left:24px;color:#999;word-break:break-all;margin-top:2px;">' + (item.package_path || '') + '</div>' +
                '</div>';
      });
      html += '</div>';
      html += '<button class="layui-btn layui-btn-xs layui-btn-danger" id="btn-del-records" style="margin-top:8px;">' +
              '<i class="layui-icon layui-icon-delete"></i> 删除选中记录</button>';
    }
    html += '</div>';

    // 右侧：orphan_files（可勾选删除磁盘文件）
    html += '<div style="flex:1;min-width:0;">';
    html += '<div style="font-weight:600;margin-bottom:8px;color:#ffb800;"><i class="layui-icon layui-icon-warn"></i> 孤儿文件（磁盘有文件）</div>';
    if (orphan.length === 0) {
      html += '<div style="color:#999;padding:10px;border:1px solid #eee;border-radius:4px;">无孤儿文件</div>';
    } else {
      html += '<div style="border:1px solid #eee;border-radius:4px;max-height:300px;overflow:auto;">';
      html += '<div style="padding:8px 10px;background:#f8f8f8;border-bottom:1px solid #eee;">' +
              '<input type="checkbox" id="orphan-all" lay-skin="primary" onclick="window._selectAllOrphan(this)"> ' +
              '<label for="orphan-all" style="font-size:12px;cursor:pointer;">全选</label>' +
              '</div>';
      orphan.forEach(function(item) {
        var safePath = (item.file_path || '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
        html += '<div style="padding:8px 10px;border-bottom:1px solid #f0f0f0;font-size:12px;">' +
                '<input type="checkbox" name="orphan-ck" data-path="' + safePath + '" lay-skin="primary" title="' + formatSize(item.file_size) + '"> ' +
                '<div style="margin-left:24px;color:#999;word-break:break-all;margin-top:2px;">' + (item.file_path || '') + '</div>' +
                '</div>';
      });
      html += '</div>';
      html += '<button class="layui-btn layui-btn-xs layui-btn-warm" id="btn-del-orphan" style="margin-top:8px;">' +
              '<i class="layui-icon layui-icon-delete"></i> 删除选中文件</button>';
    }
    html += '</div>';

    html += '</div>'; // flex
    html += '</div>'; // padding

    var resultIndex = layer.open({
      type: 1,
      title: '一致性检查结果',
      content: html,
      area: ['900px', '520px'],
      maxmin: true,
      success: function() {
        form.render();

        // 删除选中数据库记录（missing_files）
        var btnDelRecords = document.getElementById('btn-del-records');
        if (btnDelRecords) {
          btnDelRecords.onclick = function() {
            var ids = [];
            document.querySelectorAll('input[name="missing-ck"]:checked').forEach(function(el) {
              ids.push(el.value);
            });
            if (ids.length === 0) {
              layer.msg('请先勾选要删除的记录', { icon: 0 });
              return;
            }
            layer.confirm('确定删除选中的 ' + ids.length + ' 条数据库记录？', function(idx) {
              layer.close(idx);
              var loadIdx = layer.load(2, { shade: [0.3, '#000'] });
              var done = 0, failed = 0;
              var total = ids.length;
              ids.forEach(function(bid) {
                apiFetch('/api/v1/repo-files/packages/' + bid, {
                  method: 'DELETE'
                }).then(function(r) {
                  return r.json();
                }).then(function(res) {
                  if (res.code === 0) done++; else failed++;
                }).catch(function() {
                  failed++;
                }).then(function() {
                  if (done + failed === total) {
                    layer.close(loadIdx);
                    layer.msg('已删除 ' + done + ' 条记录' + (failed ? '，' + failed + ' 条失败' : ''), { icon: failed ? 2 : 1 });
                    layer.close(resultIndex);
                    reloadPackages();
                    if (viewMode === 'tree') loadTree();
                  }
                });
              });
            });
          };
        }

        // 删除选中孤儿文件（orphan_files）
        var btnDelOrphan = document.getElementById('btn-del-orphan');
        if (btnDelOrphan) {
          btnDelOrphan.onclick = function() {
            var paths = [];
            document.querySelectorAll('input[name="orphan-ck"]:checked').forEach(function(el) {
              paths.push(el.getAttribute('data-path'));
            });
            if (paths.length === 0) {
              layer.msg('请先勾选要删除的文件', { icon: 0 });
              return;
            }
            layer.confirm('确定删除选中的 ' + paths.length + ' 个孤儿文件？此操作不可恢复。', function(idx) {
              layer.close(idx);
              var loadIdx = layer.load(2, { shade: [0.3, '#000'] });
              var done = 0, failed = 0;
              var total = paths.length;
              paths.forEach(function(fp) {
                apiFetch('/api/v1/repo-files/orphan-delete', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ file_path: fp })
                }).then(function(r) {
                  return r.json();
                }).then(function(res) {
                  if (res.code === 0) done++; else failed++;
                }).catch(function() {
                  failed++;
                }).then(function() {
                  if (done + failed === total) {
                    layer.close(loadIdx);
                    layer.msg('已删除 ' + done + ' 个文件' + (failed ? '，' + failed + ' 个失败' : ''), { icon: failed ? 2 : 1 });
                    layer.close(resultIndex);
                  }
                });
              });
            });
          };
        }
      }
    });
  }
});
</script>
{% endblock %}
