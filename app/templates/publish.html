{% extends "base.html" %}

{% block title %}自定义扩展发布{% endblock %}

{% block content %}
<div class="page-title" style="display:flex;justify-content:space-between;align-items:center;">
  <span>自定义扩展发布</span>
  <button class="layui-btn layui-btn-normal" id="btn-create-publisher">
    <i class="layui-icon layui-icon-add-1"></i> 创建发布者
  </button>
</div>

<!-- 发布表单 -->
<div class="sg-card" style="margin-bottom:20px;">
  <div class="page-title" style="font-size:15px;">发布新扩展</div>
  <form class="layui-form" id="publish-form" enctype="multipart/form-data">
    <div class="layui-form-item">
      <div class="layui-inline">
        <label class="layui-form-label">发布者</label>
        <div class="layui-input-inline" style="width:200px;">
          <select name="publisher_id" id="publisher-select" lay-verify="required" lay-search>
            <option value="">选择发布者</option>
          </select>
        </div>
      </div>
      <div class="layui-inline">
        <label class="layui-form-label">扩展名称</label>
        <div class="layui-input-inline" style="width:200px;">
          <input type="text" name="ext_name" required lay-verify="required" placeholder="如 myext" class="layui-input">
        </div>
      </div>
    </div>
    <div class="layui-form-item">
      <div class="layui-inline">
        <label class="layui-form-label">版本号</label>
        <div class="layui-input-inline" style="width:150px;">
          <input type="text" name="version" required lay-verify="required" placeholder="如 1.0" class="layui-input" value="1.0">
        </div>
      </div>
      <div class="layui-inline">
        <label class="layui-form-label">PG 版本</label>
        <div class="layui-input-inline" style="width:150px;">
          <input type="text" name="pg_version" required lay-verify="required" placeholder="如 16.4" class="layui-input" value="16.4">
        </div>
      </div>
      <div class="layui-inline">
        <label class="layui-form-label">风味</label>
        <div class="layui-input-inline" style="width:100px;">
          <select name="flavor">
            <option value="pg" selected>pg</option>
            <option value="bf">bf</option>
          </select>
        </div>
      </div>
    </div>
    <div class="layui-form-item">
      <div class="layui-inline">
        <label class="layui-form-label">架构</label>
        <div class="layui-input-inline" style="width:150px;">
          <select name="arch">
            <option value="x86_64" selected>x86_64</option>
            <option value="aarch64">aarch64</option>
          </select>
        </div>
      </div>
      <div class="layui-inline">
        <label class="layui-form-label">操作系统</label>
        <div class="layui-input-inline" style="width:120px;">
          <select name="os_name">
            <option value="linux" selected>linux</option>
          </select>
        </div>
      </div>
      <div class="layui-inline">
        <label class="layui-form-label">通道</label>
        <div class="layui-input-inline" style="width:120px;">
          <select name="channel">
            <option value="stable" selected>stable</option>
            <option value="beta">beta</option>
            <option value="dev">dev</option>
          </select>
        </div>
      </div>
    </div>
    <div class="layui-form-item">
      <label class="layui-form-label">扩展包 (.tgz)</label>
      <div class="layui-input-block">
        <input type="file" name="tgz_file" accept=".tgz" required lay-verify="required" class="layui-input" style="padding:4px;">
        <div style="font-size:12px;color:#999;margin-top:5px;">必须包含 .control 文件。包内结构: myext--1.0/ 目录下包含 .control 和 .so 文件。</div>
      </div>
    </div>
    <div class="layui-form-item">
      <label class="layui-form-label">描述</label>
      <div class="layui-input-block">
        <textarea name="description" placeholder="扩展功能描述" class="layui-textarea"></textarea>
      </div>
    </div>
    <div class="layui-form-item">
      <div class="layui-inline">
        <label class="layui-form-label">许可证</label>
        <div class="layui-input-inline" style="width:200px;">
          <input type="text" name="license_str" placeholder="如 Apache-2.0" class="layui-input">
        </div>
      </div>
      <div class="layui-inline">
        <label class="layui-form-label">标签</label>
        <div class="layui-input-inline" style="width:200px;">
          <input type="text" name="tags" placeholder="逗号分隔" class="layui-input">
        </div>
      </div>
    </div>
    <div class="layui-form-item">
      <div class="layui-input-block">
        <button class="layui-btn" type="submit" id="btn-submit">发布扩展</button>
        <button type="reset" class="layui-btn layui-btn-primary">重置</button>
      </div>
    </div>
  </form>
</div>

<!-- 已发布扩展列表 -->
<div class="sg-card">
  <div class="page-title" style="font-size:15px;display:flex;justify-content:space-between;align-items:center;">
    <span>已发布扩展</span>
  </div>
  <table id="published-table" lay-filter="published-table"></table>
</div>
{% endblock %}

{% block extra_script %}
<script>
layui.use(['table', 'layer', 'form', 'upload'], function(){
  var table = layui.table;
  var layer = layui.layer;
  var form = layui.form;

  // 加载发布者列表
  function loadPublishers() {
    apiFetch('/api/v1/publish/publishers').then(r => r.json()).then(res => {
      if (res.code !== 0) return;
      var select = document.getElementById('publisher-select');
      // 保留第一个 option
      while (select.options.length > 1) { select.remove(1); }
      res.data.forEach(function(p) {
        var opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name + (p.display_name !== p.name ? ' (' + p.display_name + ')' : '');
        select.appendChild(opt);
      });
      form.render('select');
    });
  }
  loadPublishers();

  // 渲染已发布扩展表格
  table.render({
    elem: '#published-table',
    url: '/api/v1/publish/extensions',
    method: 'get',
    parseData: function(res) {
      return { code: res.code, msg: res.msg, count: res.count, data: res.data };
    },
    page: true,
    limit: 10,
    cols: [[
      { field: 'name', title: '扩展名', width: 180, sort: true },
      { field: 'description', title: '描述', minWidth: 200 },
      { field: 'publisher', title: '发布者', width: 150 },
      { field: 'license', title: '许可证', width: 100 },
      { field: 'version_count', title: '版本数', width: 80 },
      { field: 'build_count', title: '构建数', width: 80 },
      { title: '操作', width: 100, toolbar: '#pub-row-ops', fixed: 'right' }
    ]],
    skin: 'row',
    even: true
  });

  // 表单提交
  document.getElementById('publish-form').onsubmit = function(e) {
    e.preventDefault();
    var formData = new FormData(this);
    var btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = '发布中...';

    apiFetch('/api/v1/publish/upload', {
      method: 'POST',
      body: formData
    }).then(r => r.json()).then(res => {
      btn.disabled = false;
      btn.textContent = '发布扩展';
      if (res.code === 0) {
        layer.msg('发布成功: ' + res.data[0].ext_name, { icon: 1 });
        document.getElementById('publish-form').reset();
        form.render();
        table.reload('published-table');
      } else {
        layer.msg(res.msg || '发布失败', { icon: 2 });
      }
    }).catch(function(err) {
      btn.disabled = false;
      btn.textContent = '发布扩展';
      layer.msg('请求失败: ' + err, { icon: 2 });
    });
    return false;
  };

  // 创建发布者
  document.getElementById('btn-create-publisher').onclick = function() {
    var html = '<form class="layui-form" style="padding:20px;">';
    html += '<div class="layui-form-item">';
    html += '<label class="layui-form-label">名称</label>';
    html += '<div class="layui-input-block">';
    html += '<input type="text" name="name" required lay-verify="required" placeholder="如 com.mycorp" class="layui-input">';
    html += '</div></div>';
    html += '<div class="layui-form-item">';
    html += '<label class="layui-form-label">显示名</label>';
    html += '<div class="layui-input-block">';
    html += '<input type="text" name="display_name" placeholder="如 My Corporation" class="layui-input">';
    html += '</div></div>';
    html += '<div class="layui-form-item" style="margin-bottom:0;">';
    html += '<div class="layui-input-block">';
    html += '<button class="layui-btn" lay-submit lay-filter="create-pub">创建</button>';
    html += '</div></div>';
    html += '</form>';

    layer.open({
      title: '创建自定义发布者',
      content: html,
      area: ['450px', '280px'],
      success: function() { form.render(); }
    });

    form.on('submit(create-pub)', function(data) {
      apiFetch('/api/v1/publish/publishers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data.field)
      }).then(r => r.json()).then(res => {
        if (res.code === 0) {
          layer.closeAll();
          layer.msg('创建成功，已生成 RSA 密钥对', { icon: 1 });
          loadPublishers();
        } else {
          layer.msg(res.msg || '创建失败', { icon: 2 });
        }
      });
      return false;
    });
  };

  // 行操作
  table.on('tool(published-table)', function(obj) {
    var data = obj.data;
    if (obj.event === 'detail') {
      window.location.href = '/extensions/' + encodeURIComponent(data.name);
    }
  });
});
</script>

<script type="text/html" id="pub-row-ops">
  <button class="layui-btn layui-btn-xs" lay-event="detail">详情</button>
</script>
{% endblock %}
