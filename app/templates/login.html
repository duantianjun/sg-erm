<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - SG-ERM</title>
  <link rel="stylesheet" href="/static/layui/css/layui.css">
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #2f4056;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .login-box {
      background: #fff;
      border-radius: 8px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .login-box .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-box .logo h1 {
      font-size: 28px;
      color: #1e9fff;
      margin: 0;
    }
    .login-box .logo p {
      font-size: 13px;
      color: #999;
      margin-top: 6px;
    }
    .login-form .layui-form-item {
      margin-bottom: 20px;
    }
    .login-form input {
      height: 42px;
    }
    .login-form button {
      width: 100%;
      height: 44px;
      font-size: 16px;
    }
    .login-tip {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <h1>SG-ERM</h1>
      <p>StackGres Extension Repository Manager</p>
    </div>
    <form class="layui-form login-form" lay-filter="loginForm">
      <div class="layui-form-item">
        <input type="text" name="username" required lay-verify="required" placeholder="用户名" autocomplete="off" class="layui-input">
      </div>
      <div class="layui-form-item">
        <input type="password" name="password" required lay-verify="required" placeholder="密码" autocomplete="off" class="layui-input">
      </div>
      <div class="layui-form-item">
        <button type="submit" class="layui-btn layui-btn-normal" lay-submit lay-filter="doLogin">登录</button>
      </div>
      <div class="login-tip" id="loginTip"></div>
    </form>
  </div>

  <script src="/static/layui/layui.js"></script>
  <script>
    layui.use(['form', 'layer'], function(){
      var form = layui.form;
      var layer = layui.layer;

      // 已登录则直接跳转首页
      var token = localStorage.getItem('sgerm_token');
      if (token) {
        window.location.href = '/';
        return;
      }

      form.on('submit(doLogin)', function(data){
        var btn = document.querySelector('button[lay-submit]');
        btn.disabled = true;
        btn.textContent = '登录中...';

        var tip = document.getElementById('loginTip');
        tip.textContent = '';
        tip.style.color = '#999';

        var fd = new FormData();
        fd.append('username', data.field.username);
        fd.append('password', data.field.password);

        fetch('/api/v1/auth/login', {
          method: 'POST',
          body: fd
        })
        .then(function(r) { return r.json(); })
        .then(function(res) {
          if (res.code === 0 && res.data && res.data.length > 0) {
            var d = res.data[0];
            localStorage.setItem('sgerm_token', d.access_token);
            localStorage.setItem('sgerm_refresh', d.refresh_token);
            localStorage.setItem('sgerm_user', JSON.stringify(d.user));
            tip.textContent = '登录成功，跳转中...';
            tip.style.color = '#5fb878';
            setTimeout(function(){
              window.location.href = '/';
            }, 500);
          } else {
            tip.textContent = res.msg || '登录失败';
            tip.style.color = '#ff5722';
            btn.disabled = false;
            btn.textContent = '登录';
          }
        })
        .catch(function(e) {
          tip.textContent = '网络错误: ' + e.message;
          tip.style.color = '#ff5722';
          btn.disabled = false;
          btn.textContent = '登录';
        });

        return false;
      });
    });
  </script>
</body>
</html>
