# SG-ERM 本地开发/测试用 docker-compose
#
# 使用方法:
#   docker-compose up -d
#
# 访问:
#   Web UI:  http://localhost:18070
#   API 文档: http://localhost:18070/docs
#   健康检查: http://localhost:18070/health

version: "3.8"

services:
  sg-erm:
    build:
      context: .
      dockerfile: Dockerfile
    image: sg-erm:latest
    container_name: sg-erm
    restart: unless-stopped
    ports:
      - "18070:18070"
    environment:
      - SG_ERM_DATA_DIR=/data
      - SG_ERM_LISTEN_HOST=0.0.0.0
      - SG_ERM_LISTEN_PORT=18070
      - SG_ERM_PROXY_MODE=hybrid
      - SG_ERM_UPSTREAM_REPO_URL=https://extensions.stackgres.io/postgres/repository
      - SG_ERM_SYNC_CONCURRENCY=8
      # 生产环境必须修改密钥！
      - SG_ERM_SECRET_KEY=dev-only-not-for-production
      - TZ=Asia/Shanghai
    volumes:
      - sg-erm-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:18070/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  sg-erm-data:
    driver: local
