# SG-ERM Alembic 配置

[alembic]
# 迁移脚本目录
script_location = alembic

# 模板（async）
# file_template = %%(rev)s_%%(slug)s

# 时间戳格式
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# 路径分隔符
prepend_sys_path = .

# 默认数据库 URL（env.py 会从 app.config 读取，覆盖此值）
# 保留此处仅为 alembic 命令行工具兼容
sqlalchemy.url = sqlite+aiosqlite:///./data/sg-erm.db

[post_write_hooks]

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
